<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
  margin:0;
  background:transparent;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

#boxContainer{
  position:relative;
}

#box{
  width:320px;
  image-rendering:pixelated;
}

#item{
  position:absolute;
  top:20%;
  left:50%;
  transform:translate(-50%, -50%);
  width:220px;
  display:none;
  image-rendering:pixelated;
}

#glow{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:350px;
  height:350px;
  background:radial-gradient(circle, rgba(0,255,0,0.5), transparent);
  border-radius:50%;
  animation:pulse 1.5s infinite;
  display:none;
}

@keyframes pulse{
  0%{transform:translate(-50%,-50%) scale(1); opacity:0.6;}
  50%{transform:translate(-50%,-50%) scale(1.2); opacity:1;}
  100%{transform:translate(-50%,-50%) scale(1); opacity:0.6;}
}
</style>
</head>

<body>

<div id="boxContainer">
  <div id="glow"></div>
  <img id="box" src="cerrda-box.png">
  <img id="item">
</div>

<script>

const audioCaja = new Audio("mystery-box.mp3");

const cajaCerrada = "cerrda-box.png";
const cajaAbierta = "abierta-box.png";

const items = [
  "rey gun.png",
  "thunder.png",
  "apoticon.png",
  "samatha.png",
];

function abrirCaja(){

  let box = document.getElementById("box");
  let item = document.getElementById("item");
  let glow = document.getElementById("glow");

  item.style.display = "none";
  glow.style.display = "none";
  box.src = cajaCerrada;

  audioCaja.currentTime = 0;
  audioCaja.play();

  setTimeout(()=>{
    box.src = cajaAbierta;
    glow.style.display = "block";
  },1500);

  setTimeout(()=>{

    item.style.display = "block";

    let i = 0;
    let speed = 80;
    let totalTime = 0;
    let duration = 4000;

    let interval = setInterval(()=>{

      item.src = items[i % items.length];
      item.style.opacity = Math.random() > 0.5 ? "1" : "0.5";

      i++;
      totalTime += speed;

      if(totalTime > duration * 0.6){
        speed += 20;
      }

      if(totalTime >= duration){
        clearInterval(interval);

        let final = items[Math.floor(Math.random()*items.length)];
        item.src = final;
        item.style.opacity = "1";

        item.style.transform = "translate(-50%, -60%) scale(1.3)";
        setTimeout(()=>{
          item.style.transform = "translate(-50%, -50%) scale(1)";
        },200);
      }

    }, speed);

  },2500);
}

// 🔥 TikFinity trigger
window.addEventListener("message", (event) => {
  if(event.data === "play"){
    abrirCaja();
  }
});

// 🧪 prueba manual
abrirCaja();

</script>

</body>
</html>
